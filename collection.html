        const grid = document.getElementById('collectionGrid');
        const eraBtns = document.querySelectorAll('.era-btn');
        const govSelect = document.getElementById('govSelect');
        const modal = document.getElementById('detailModal');
        const closeModalBtn = document.getElementById('closeModal');

        const mainImg = document.getElementById('mainImage');
        const main3D = document.getElementById('main3D');
        const mediaHint = document.getElementById('mediaHint');
        const thumbsContainer = document.getElementById('thumbnailsContainer');

        function renderCards(data) {
            grid.innerHTML = ''; 
            const shuffled = data.sort(() => 0.5 - Math.random()); 

            shuffled.forEach(item => {
                const card = document.createElement('div');
                card.className = 'artifact-card';
                card.innerHTML = `
                    <img src="${item.coverImg}" alt="${item.title}" onerror="this.src='asset/placeholder.jpg'">
                    <div class="card-info">
                        <span class="card-era-gov">${item.era} • ${item.gov.replace('-', ' ')}</span>
                        <h3 class="card-title">${item.title}</h3>
                    </div>
                `;
                card.addEventListener('click', () => openModal(item));
                grid.appendChild(card);
            });
        }

        function filterData() {
            const activeEra = document.querySelector('.era-btn.active').dataset.era;
            const activeGov = govSelect.value;

            const filtered = artifacts.filter(item => {
                const matchEra = (activeEra === 'all' || item.era === activeEra);
                const matchGov = (activeGov === 'all' || item.gov === activeGov);
                return matchEra && matchGov;
            });

            renderCards(filtered);
        }

        eraBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                eraBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                filterData();
            });
        });
        govSelect.addEventListener('change', filterData);

        function openModal(item) {
            document.getElementById('modalTitle').innerText = item.title;
            document.getElementById('modalMeta').innerText = `${item.era.toUpperCase()} • ${item.gov.replace('-', ' ').toUpperCase()}`;
            document.getElementById('modalTeaser').innerText = item.teaser;
            
            thumbsContainer.innerHTML = ''; 

            if (item.gallery && item.gallery.length > 0) {
                item.gallery.forEach((media, index) => {
                    const thumb = document.createElement('div');
                    thumb.className = `thumb-box ${index === 0 ? 'active' : ''}`; 
                    
                    const thumbImgSrc = media.type === '3d' ? (media.thumb || item.coverImg) : media.src;
                    
                    thumb.innerHTML = `
                        <img src="${thumbImgSrc}" onerror="this.src='asset/placeholder.jpg'">
                        ${media.type === '3d' ? '<div class="thumb-3d-badge">3D</div>' : ''}
                    `;

                    thumb.addEventListener('click', () => {
                        document.querySelectorAll('.thumb-box').forEach(t => t.classList.remove('active'));
                        thumb.classList.add('active');
                        displayMedia(media);
                    });

                    thumbsContainer.appendChild(thumb);
                });

                displayMedia(item.gallery[0]); 
            } else {
                displayMedia({ type: 'image', src: item.coverImg });
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }

        function displayMedia(media) {
            if (media.type === 'image') {
                main3D.style.display = 'none';
                mediaHint.style.display = 'none';
                main3D.src = ''; 
                mainImg.src = media.src;
                mainImg.style.display = 'block';
            } else if (media.type === '3d') {
                mainImg.style.display = 'none';
                main3D.src = media.src;
                main3D.style.display = 'block';
                mediaHint.style.display = 'block';
            }
        }

        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
            main3D.src = ''; 
        });

        modal.addEventListener('click', (e) => {
            if(e.target === modal) closeModalBtn.click();
        });

        renderCards(artifacts);
    </script>
